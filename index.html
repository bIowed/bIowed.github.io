<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DESK LLC</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-main: #f0f6fc;
            --accent: #58a6ff;
            --border-color: #30363d;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        h1 {
            color: var(--text-main);
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .subtitle {
            color: var(--accent);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .info-group {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }
        .info-group:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .value {
            font-size: 16px;
            color: var(--text-main);
            line-height: 1.5;
        }
        footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>"AI DESK" Məhdud Məsuliyyətli Cəmiyyəti</h1>
        <div class="subtitle">Rəsmi İnformasiya Səhifəsi</div>

        <div class="info-group">
            <div class="label">VÖEN</div>
            <div class="value">1704211071</div>
        </div>

        <div class="info-group">
            <div class="label">Hüquqi Ünvan (Legal Address)</div>
            <div class="value">AZ1001, Bakı şəhəri Səbail rayonu, Bünyad Sərdarov, ev.16, m.4</div>
        </div>

        <div class="info-group">
            <div class="label">Qeydiyyat Tarixi</div>
            <div class="value">12.05.2026</div>
        </div>

        <div class="info-group">
            <div class="label">Status</div>
            <div class="value" style="color: #3fb950;">Aktiv / Dövlət Qeydiyyatı Alınmışdır</div>
        </div>
    </div>
    <footer>
        &copy; 2026 AI DESK LLC. Bütün hüquqlar qorunur.
    </footer>
</div>

</body>
</html>
